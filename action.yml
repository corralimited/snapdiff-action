name: 'SnapDiff Visual Test'
description: 'Run visual regression tests with SnapDiff. Auto-discovers your preview URL from GitHub deployments — works with Vercel, Netlify, Cloudflare Pages, and any host that writes deployment statuses.'
branding:
  icon: 'eye'
  color: 'purple'

inputs:
  api-key:
    description: 'SnapDiff API key (sd_live_xxx or sd_test_xxx)'
    required: true
  project:
    description: 'Project slug or ID'
    required: true
  pages:
    description: |
      Pages to test, one per line in "name=path" or "name=url" format.
      Paths (starting with /) are resolved against the auto-discovered preview/production URL.
      Full URLs are used as-is (skips auto-discovery for that page).
      Example:
        homepage=/
        pricing=/pricing
        external=https://other-host.com/page
    required: true
  api-url:
    description: 'SnapDiff API base URL'
    required: false
    default: 'https://api.snapdiff.ai'
  preview-url:
    description: 'Override auto-discovery with an explicit base URL (e.g. https://staging.myapp.com). Use this if your host does not write GitHub deployment statuses.'
    required: false
    default: ''
  extra-headers:
    description: 'HTTP headers applied to every page capture, one per line as `Key: value`. Use to authenticate against protected previews (Vercel Protection Bypass, Cloudflare Access, basic auth, etc.). Header values are sent only on the capture request and never persisted in SnapDiff.'
    required: false
    default: ''
  preview-environment:
    description: |
      Substring filter to match the GitHub deployment environment name (case-insensitive).
      Defaults to "preview" on pull_request events, "production" otherwise.
      Set to e.g. "staging" or your Vercel project alias if you have multiple environments per SHA.
    required: false
    default: ''
  preview-timeout:
    description: 'Maximum minutes to wait for the preview deployment to become available'
    required: false
    default: '10'
  viewport-width:
    description: 'Viewport width in CSS pixels'
    required: false
    default: '1280'
  viewport-height:
    description: 'Viewport height in CSS pixels'
    required: false
    default: '720'
  full-page:
    description: 'Capture the entire scrollable page instead of just the viewport'
    required: false
    default: 'false'
  github-token:
    description: 'Token used to read deployment statuses. Defaults to the workflow GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}
  wait:
    description: 'Wait for the build to finish diffing and report results'
    required: false
    default: 'true'
  wait-timeout:
    description: 'Maximum minutes to wait for build completion'
    required: false
    default: '5'

outputs:
  build-id:
    description: 'The SnapDiff build ID'
    value: ${{ steps.capture-and-build.outputs.build_id }}
  status:
    description: 'Build status (approved, changes_requested, failed)'
    value: ${{ steps.poll-build.outputs.status }}
  changed-count:
    description: 'Number of pages with visual changes'
    value: ${{ steps.poll-build.outputs.changed_count }}
  review-url:
    description: 'URL to review the build in the SnapDiff dashboard'
    value: ${{ steps.capture-and-build.outputs.review_url }}
  preview-url:
    description: 'The base URL that was discovered (or the explicit preview-url input)'
    value: ${{ steps.discover-preview.outputs.preview_url }}

runs:
  using: 'composite'
  steps:
    - name: Discover preview URL
      id: discover-preview
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        SD_PREVIEW_URL_OVERRIDE: ${{ inputs.preview-url }}
        SD_ENVIRONMENT_OVERRIDE: ${{ inputs.preview-environment }}
        SD_TIMEOUT_MIN: ${{ inputs.preview-timeout }}
        SD_REPO: ${{ github.repository }}
        SD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        SD_EVENT: ${{ github.event_name }}
        SD_PAGES_INPUT: ${{ inputs.pages }}
      run: |
        if [ -n "$SD_PREVIEW_URL_OVERRIDE" ]; then
          echo "Using explicit preview-url: $SD_PREVIEW_URL_OVERRIDE"
          echo "preview_url=${SD_PREVIEW_URL_OVERRIDE%/}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # If every page is already an absolute URL, deployment discovery is
        # unnecessary — lets the action work for hosts that don't write
        # GitHub deployments (GH Pages, static hosting, FTP, etc).
        NON_URL_PAGES=$(printf '%s\n' "$SD_PAGES_INPUT" | awk -F= '/=/ {sub(/^[ \t]+/, "", $2); print $2}' | grep -v '^https\?://' | grep -v '^[[:space:]]*$' || true)
        if [ -z "$NON_URL_PAGES" ]; then
          echo "All pages are absolute URLs — skipping deployment discovery."
          echo "preview_url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ -n "$SD_ENVIRONMENT_OVERRIDE" ]; then
          ENV_FILTER="$SD_ENVIRONMENT_OVERRIDE"
        elif [ "$SD_EVENT" = "pull_request" ]; then
          ENV_FILTER="preview"
        else
          ENV_FILTER="production"
        fi
        ENV_FILTER_LC=$(printf '%s' "$ENV_FILTER" | tr '[:upper:]' '[:lower:]')

        echo "Looking for deployment with environment matching '$ENV_FILTER' for $SD_SHA"

        MAX_ATTEMPTS=$(( SD_TIMEOUT_MIN * 6 ))  # 10s per attempt
        PREVIEW_URL=""
        for i in $(seq 1 $MAX_ATTEMPTS); do
          DEPLOYMENTS=$(gh api "/repos/$SD_REPO/deployments?sha=$SD_SHA&per_page=30" 2>/dev/null || echo '[]')
          COUNT=$(echo "$DEPLOYMENTS" | jq 'length')

          if [ "$COUNT" -gt 0 ]; then
            for DID in $(echo "$DEPLOYMENTS" | jq -r '.[].id'); do
              STATUS_JSON=$(gh api "/repos/$SD_REPO/deployments/$DID/statuses?per_page=1" 2>/dev/null || echo '[]')
              STATE=$(echo "$STATUS_JSON" | jq -r '.[0].state // empty')
              ENV_URL=$(echo "$STATUS_JSON" | jq -r '.[0].environment_url // empty')
              ENV_NAME=$(echo "$DEPLOYMENTS" | jq -r --arg id "$DID" '.[] | select(.id == ($id|tonumber)) | .environment // empty' | tr '[:upper:]' '[:lower:]')

              if [ "$STATE" = "success" ] && [ -n "$ENV_URL" ] && echo "$ENV_NAME" | grep -qi "$ENV_FILTER_LC"; then
                PREVIEW_URL="$ENV_URL"
                echo "Found '$ENV_NAME' deployment: $PREVIEW_URL"
                break
              fi

              if [ "$STATE" = "failure" ] || [ "$STATE" = "error" ]; then
                echo "::warning::Deployment $DID for environment '$ENV_NAME' is in state '$STATE' — skipping"
              fi
            done
          fi

          if [ -n "$PREVIEW_URL" ]; then break; fi
          echo "  No matching deployment yet (attempt $i/$MAX_ATTEMPTS)..."
          sleep 10
        done

        if [ -z "$PREVIEW_URL" ]; then
          echo "::error::No '$ENV_FILTER' deployment with state=success found for $SD_SHA after $SD_TIMEOUT_MIN minutes."
          echo "::error::If your host does not write GitHub deployments, set the 'preview-url' input explicitly."
          exit 1
        fi

        echo "preview_url=${PREVIEW_URL%/}" >> "$GITHUB_OUTPUT"

    - name: Parse pages input
      id: parse-pages
      shell: bash
      env:
        SD_PAGES_INPUT: ${{ inputs.pages }}
        SD_PREVIEW_URL: ${{ steps.discover-preview.outputs.preview_url }}
      run: |
        PAGES_JSON=$(printf '%s\n' "$SD_PAGES_INPUT" | grep '=' | while IFS='=' read -r name target; do
          name=$(echo "$name" | xargs)
          target=$(echo "$target" | xargs)
          [ -z "$name" ] || [ -z "$target" ] && continue
          case "$target" in
            http://*|https://*) url="$target" ;;
            /*) url="${SD_PREVIEW_URL}${target}" ;;
            *)  url="${SD_PREVIEW_URL}/${target}" ;;
          esac
          echo "{\"name\":\"$name\",\"url\":\"$url\"}"
        done | jq -sc '.')
        echo "pages_json=$PAGES_JSON" >> "$GITHUB_OUTPUT"
        if [ -n "$SD_PREVIEW_URL" ]; then
          echo "::notice::Snapping pages against $SD_PREVIEW_URL"
        fi

    - name: Parse extra headers
      id: parse-headers
      shell: bash
      env:
        SD_HEADERS_INPUT: ${{ inputs.extra-headers }}
      run: |
        if [ -z "$SD_HEADERS_INPUT" ]; then
          echo "headers_json=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        HEADERS_JSON=$(printf '%s\n' "$SD_HEADERS_INPUT" | awk -F: '
          /:/ {
            key = $1
            sub(/^[ \t]+|[ \t]+$/, "", key)
            value = substr($0, index($0, ":") + 1)
            sub(/^[ \t]+|[ \t]+$/, "", value)
            if (key != "" && value != "") {
              gsub(/"/, "\\\"", key)
              gsub(/"/, "\\\"", value)
              print "{\"" key "\":\"" value "\"}"
            }
          }
        ' | jq -sc 'add // {}')
        echo "headers_json=$HEADERS_JSON" >> "$GITHUB_OUTPUT"

    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Playwright Chromium
      shell: bash
      working-directory: ${{ github.action_path }}/runtime
      run: |
        npm install --no-audit --no-fund --silent
        npx playwright install --with-deps chromium

    - name: Capture & create build
      id: capture-and-build
      shell: bash
      working-directory: ${{ github.action_path }}/runtime
      env:
        SD_API_URL: ${{ inputs.api-url }}
        SD_API_KEY: ${{ inputs.api-key }}
        SD_PROJECT: ${{ inputs.project }}
        SD_PAGES_JSON: ${{ steps.parse-pages.outputs.pages_json }}
        SD_HEADERS_JSON: ${{ steps.parse-headers.outputs.headers_json }}
        SD_VIEWPORT_WIDTH: ${{ inputs.viewport-width }}
        SD_VIEWPORT_HEIGHT: ${{ inputs.viewport-height }}
        SD_FULL_PAGE: ${{ inputs.full-page }}
        SD_BRANCH: ${{ github.head_ref || github.ref_name }}
        SD_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        SD_COMMIT_MSG: ${{ github.event.pull_request.title || github.event.head_commit.message }}
        SD_PR_URL: ${{ github.event.pull_request.html_url }}
      run: node capture-and-build.mjs

    - name: Wait for build completion
      id: poll-build
      if: inputs.wait == 'true'
      shell: bash
      env:
        SD_API_URL: ${{ inputs.api-url }}
        SD_API_KEY: ${{ inputs.api-key }}
        SD_BUILD_ID: ${{ steps.capture-and-build.outputs.build_id }}
        SD_PROJECT: ${{ inputs.project }}
        SD_WAIT_TIMEOUT: ${{ inputs.wait-timeout }}
        SD_REVIEW_URL: ${{ steps.capture-and-build.outputs.review_url }}
      run: |
        # 12 polls per minute (5s interval) × wait-timeout minutes
        MAX_ATTEMPTS=$(( SD_WAIT_TIMEOUT * 12 ))
        ATTEMPT=0
        POLL_URL="${SD_API_URL}/v1/projects/${SD_PROJECT}/builds/${SD_BUILD_ID}"

        echo "Waiting for build $SD_BUILD_ID to complete (timeout: ${SD_WAIT_TIMEOUT}m)..."

        while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
          ATTEMPT=$((ATTEMPT + 1))
          sleep 5

          RESPONSE=$(curl -s "$POLL_URL" -H "X-API-Key: ${SD_API_KEY}")
          STATUS=$(echo "$RESPONSE" | jq -r '.status')

          if [ "$STATUS" = "approved" ]; then
            TOTAL=$(echo "$RESPONSE" | jq -r '.total_snapshots // 0')
            echo "status=approved" >> "$GITHUB_OUTPUT"
            echo "changed_count=0" >> "$GITHUB_OUTPUT"
            echo "::notice::All $TOTAL pages match baselines — no visual changes"
            exit 0
          elif [ "$STATUS" = "changes_requested" ]; then
            CHANGED=$(echo "$RESPONSE" | jq -r '.changed_count // 0')
            TOTAL=$(echo "$RESPONSE" | jq -r '.total_snapshots // 0')
            echo "status=changes_requested" >> "$GITHUB_OUTPUT"
            echo "changed_count=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "::notice::$CHANGED of $TOTAL pages changed — pending review at $SD_REVIEW_URL"
            # Workflow stays green; merge gating is the `snapdiff/visual-test`
            # commit status set on the PR head SHA via the GitHub API.
            exit 0
          elif [ "$STATUS" = "failed" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "changed_count=0" >> "$GITHUB_OUTPUT"
            echo "::error::Visual regression test failed"
            exit 1
          fi

          echo "  Build status: $STATUS (attempt $ATTEMPT/$MAX_ATTEMPTS)"
        done

        echo "::error::Build timed out after $MAX_ATTEMPTS attempts"
        exit 1
